name: Bug report
description: Report a reproducible problem with the integration
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Include the smallest set of details needed to reproduce the problem.
  - type: input
    id: home_assistant_version
    attributes:
      label: Home Assistant version
      placeholder: "2026.3.1"
    validations:
      required: true
  - type: input
    id: integration_version
    attributes:
      label: Integration version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened
      description: Describe the incorrect behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps required to trigger the issue.
      placeholder: |
        1. Add the integration
        2. Enable channel X
        3. Call endpoint Y
        4. Observe failure Z
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or diagnostics
      description: Paste only the relevant section. Redact secrets.
      render: text
